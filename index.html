<!DOCTYPE html>
<html>
<head>
<title>BODMAS Quiz Test</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to right, #e6ccff, #f3e6ff);
    display: flex;
    justify-content: center;
    align-items:center;
    min-height: 100vh;
    margin: 0;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 20px;
    width: 520px;
    text-align: center;
}

button {
    padding: 10px;
    margin-top: 10px;
    background: #9d4edd;
    color: white;
    border: none;
    border-radius: 8px;
}

.section { margin-top: 20px; }
</style>
</head>

<body>

<div class="container">

<h1>BODMAS Quiz Test</h1>
<input type="text" id="name" placeholder="Enter Name">

<div class="section">
<h2>Before Practice</h2>
<button onclick="startBefore()">Start</button>

<div id="beforeQ" style="display:none; text-align:left;">

<p>1. Solve: 4 - 3 + 2 ÷ 2 × 4 - 7 + 8</p>
<label><input type="radio" name="b1" value="6"> 6</label><br>
<label><input type="radio" name="b1" value="8"> 8</label><br>
<label><input type="radio" name="b1" value="10"> 10</label><br>
<label><input type="radio" name="b1" value="12"> 12</label><br>

<button id="beforeBtn" onclick="submitBefore()">Submit</button>
</div>

<p id="beforeTime"></p>
</div>

<!-- PRACTICE -->
<div id="practiceBox" style="display:none;">
<h2>BODMAS Concept</h2>
<p>⏱ Time Remaining:</p>
<p id="timer">01:30</p>
</div>

<div class="section" id="afterBox" style="display:none;">
<h2>After Practice</h2>

<div id="afterQ" style="text-align:left;">
<p>2. Solve: 6 + 9 + 3 + 2 × 9(4 + 3 + 3 + 2)</p>
<label><input type="radio" name="a1" value="240"> 240</label><br>
<label><input type="radio" name="a1" value="234"> 234</label><br>
<label><input type="radio" name="a1" value="252"> 252</label><br>
<label><input type="radio" name="a1" value="210"> 210</label><br>

<button id="afterBtn" onclick="submitAfter()">Submit</button>
</div>

<p id="afterResult"></p>
</div>

<h2 id="result"></h2>

</div>

<script>

const answersBefore = ["6"];
const answersAfter = ["234"];

let beforeStart, afterStart;
let beforeSubmitted = false, afterSubmitted = false;
let beforeTimeValue = 0, afterTimeValue = 0;
let beforeScoreValue = 0, afterScoreValue = 0;

let timeLeft = 90;
let timerInterval;

function startTimer(){
    timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById("timer").innerText =
            "00:" + (timeLeft < 10 ? "0"+timeLeft : timeLeft);

        if(timeLeft <= 0){
            clearInterval(timerInterval);
            document.getElementById("afterBox").style.display="block";
            afterStart = Date.now();
        }
    }, 1000);
}

function getScore(prefix, answers){
    let score=0;
    for(let i=1;i<=answers.length;i++){
        let options=document.getElementsByName(prefix+i);
        for(let opt of options){
            if(opt.checked && opt.value===answers[i-1]) score++;
        }
    }
    return score;
}

function allAnswered(prefix,total){
    for(let i=1;i<=total;i++){
        let checked=false;
        let options=document.getElementsByName(prefix+i);
        for(let opt of options){
            if(opt.checked) checked=true;
        }
        if(!checked) return false;
    }
    return true;
}

function startBefore(){
    if(document.getElementById("name").value===""){
        alert("Enter name");
        return;
    }
    beforeStart=Date.now();
    document.getElementById("beforeQ").style.display="block";
}

function submitBefore(){
    if(beforeSubmitted) return;

    if(!allAnswered("b",1)){
        alert("Answer the question!");
        return;
    }

    beforeSubmitted=true;
    document.getElementById("beforeBtn").disabled=true;

    beforeTimeValue=(Date.now()-beforeStart)/1000;
    beforeScoreValue=getScore("b",answersBefore);

    document.getElementById("beforeTime").innerHTML =
        "Time: "+beforeTimeValue.toFixed(1)+" sec | Score: "+beforeScoreValue+"/1";

    document.getElementById("practiceBox").style.display="block";
    startTimer();
}

function submitAfter(){
    if(afterSubmitted) return;

    if(!allAnswered("a",1)){
        alert("Answer the question!");
        return;
    }

    afterSubmitted=true;
    document.getElementById("afterBtn").disabled=true;

    afterTimeValue=(Date.now()-afterStart)/1000;
    afterScoreValue=getScore("a",answersAfter);

    document.getElementById("afterResult").innerHTML =
        "Time: "+afterTimeValue.toFixed(1)+" sec | Score: "+afterScoreValue+"/1";

    document.getElementById("result").innerHTML =
        "🎉 Thank you for completing the test!";

    sendData();
}

function sendData(){
    const url = "YOUR_GOOGLE_SCRIPT_URL";

    const data = {
        name: document.getElementById("name").value,
        beforeTime: beforeTimeValue.toFixed(1),
        afterTime: afterTimeValue.toFixed(1),
        beforeScore: beforeScoreValue,
        afterScore: afterScoreValue
    };

    fetch(url, {
        method: "POST",
        body: JSON.stringify(data)
    });
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Performance Test</title>
    <style>
        body { font-family: Arial; margin: 30px; }
        .section { margin-bottom: 30px; }
        button { padding: 8px 15px; margin-top: 10px; }

        #practiceBox {
            display:none;
            font-size: 20px;
            color: blue;
        }
    </style>
</head>

<body>

<h1>Task Performance Test</h1>

<!-- NAME -->
<h3>Enter Name:</h3>
<input type="text" id="name" placeholder="Enter your name">

<!-- BEFORE PRACTICE -->
<div class="section">
    <h2>Before Practice</h2>
    <button onclick="startBefore()">Start</button>

    <div id="beforeQ" style="display:none;">
        <p>1. 5 + 3 = ?</p>
        <input type="text"><br>

        <p>2. 10 - 4 = ?</p>
        <input type="text"><br>

        <p>3. 6 × 2 = ?</p>
        <input type="text"><br>

        <button onclick="submitBefore()">Submit</button>
    </div>

    <p id="beforeTime"></p>
</div>

<!-- PRACTICE TIMER -->
<div id="practiceBox">
    <h2>Practice Time (2 minutes)</h2>
    <p id="practiceTimer">02:00</p>
</div>

<!-- AFTER PRACTICE -->
<div class="section">
    <h2>After Practice</h2>
    <button id="afterStartBtn" onclick="startAfter()" disabled>Start</button>

    <div id="afterQ" style="display:none;">
        <p>1. 5 + 3 = ?</p>
        <input type="text"><br>

        <p>2. 10 - 4 = ?</p>
        <input type="text"><br>

        <p>3. 6 × 2 = ?</p>
        <input type="text"><br>

        <button onclick="submitAfter()">Submit</button>
    </div>

    <p id="afterTime"></p>
</div>

<h2 id="result"></h2>

<script>
let beforeStart, afterStart;
let beforeTime = 0, afterTime = 0;

// PRACTICE TIMER
let practiceTime = 120;
let practiceInterval;

// START BEFORE
function startBefore() {
    let name = document.getElementById("name").value;
    if (name === "") {
        alert("Enter your name first!");
        return;
    }
    beforeStart = new Date().getTime();
    document.getElementById("beforeQ").style.display = "block";
}

// SUBMIT BEFORE → PRACTICE
function submitBefore() {
    beforeTime = (new Date().getTime() - beforeStart) / 1000;

    document.getElementById("beforeTime").innerHTML =
        "Time: " + beforeTime + " seconds";

    document.getElementById("beforeQ").style.display = "none";

    // 🔥 POP-UP DESCRIPTION
    alert(
        "Practice Session Instructions:\n\n" +
        "You will be practicing basic mathematical calculations.\n\n" +
        "The questions include:\n" +
        "• Addition\n" +
        "• Subtraction\n" +
        "• Multiplication\n\n" +
        "Focus on solving quickly and accurately.\n" +
        "Try to improve your speed for the next round!"
    );

    // Show timer
    document.getElementById("practiceBox").style.display = "block";

    startPracticeTimer();
}

// PRACTICE TIMER
function startPracticeTimer() {
    practiceTime = 120;

    practiceInterval = setInterval(() => {

        let minutes = Math.floor(practiceTime / 60);
        let seconds = practiceTime % 60;

        document.getElementById("practiceTimer").innerText =
            minutes + ":" + (seconds < 10 ? "0" : "") + seconds;

        practiceTime--;

        if (practiceTime < 0) {
            clearInterval(practiceInterval);

            document.getElementById("practiceBox").style.display = "none";

            document.getElementById("afterStartBtn").disabled = false;

            alert("Practice time over! Now start After Practice.");
        }

    }, 1000);
}

// START AFTER
function startAfter() {
    afterStart = new Date().getTime();
    document.getElementById("afterQ").style.display = "block";
}

// SUBMIT AFTER
function submitAfter() {
    afterTime = (new Date().getTime() - afterStart) / 1000;

    document.getElementById("afterTime").innerHTML =
        "Time: " + afterTime + " seconds";

    showResult();
}

// RESULT
function showResult() {
    if (afterTime < beforeTime) {
        document.getElementById("result").innerHTML =
            "✅ Performance Improved!";
    } else {
        document.getElementById("result").innerHTML =
            "❌ No Improvement";
    }
}
</script>

</body>
</html>
